app = "ac-pulse"
primary_region = "ord"

[build]

[env]
PORT = "8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1

[processes]
app = "bash -lc "uv run arq app.workers.settings.WorkerSettings & uv run uvicorn app.main:app --host 0.0.0.0 --port 8080""
